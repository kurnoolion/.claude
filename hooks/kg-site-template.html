<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

#sidebar {
  width: 280px; min-width: 280px; background: #16213e; border-right: 1px solid #0f3460;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-header { padding: 16px; border-bottom: 1px solid #0f3460; }
#sidebar-header h1 { font-size: 18px; color: #e94560; margin-bottom: 8px; }
#stats { font-size: 13px; color: #888; margin-bottom: 12px; }
#search { width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0; font-size: 14px; outline: none; }
#search:focus { border-color: #e94560; }
#search::placeholder { color: #555; }

#filters { padding: 12px 16px; border-bottom: 1px solid #0f3460; display: flex; flex-wrap: wrap; gap: 6px; }
.filter-btn {
  padding: 4px 10px; border-radius: 12px; border: 1px solid #333; background: transparent;
  color: #aaa; font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.filter-btn.active { color: #fff; border-color: currentColor; }
.filter-btn:hover { opacity: 0.8; }

#entity-list { flex: 1; overflow-y: auto; padding: 8px; }
.entity-item {
  padding: 8px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px;
  display: flex; align-items: center; gap: 8px; font-size: 13px;
}
.entity-item:hover { background: #1a1a2e; }
.entity-item.selected { background: #0f3460; }
.entity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.entity-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.entity-count { color: #666; font-size: 11px; }

#graph-container { flex: 1; position: relative; }
#graph { width: 100%; height: 100%; }

#detail-panel {
  width: 360px; min-width: 360px; background: #16213e; border-left: 1px solid #0f3460;
  overflow-y: auto; display: none; flex-direction: column;
}
#detail-panel.visible { display: flex; }
#detail-header {
  padding: 16px; border-bottom: 1px solid #0f3460; position: relative;
}
#detail-header h2 { font-size: 18px; margin-bottom: 4px; padding-right: 30px; }
.detail-type-badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px;
  margin-right: 8px; margin-bottom: 8px;
}
.detail-date { font-size: 12px; color: #666; }
#close-detail { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #888; cursor: pointer; font-size: 20px; }
#close-detail:hover { color: #fff; }

#detail-body { padding: 16px; flex: 1; }

.detail-section { margin-bottom: 20px; }
.detail-section h3 { font-size: 13px; color: #e94560; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.detail-desc { font-size: 14px; color: #ccc; line-height: 1.5; }

.connection-item {
  font-size: 13px; color: #aaa; padding: 6px 8px; cursor: pointer;
  border-radius: 4px; display: flex; align-items: center; gap: 6px;
}
.connection-item:hover { color: #fff; background: #1a1a2e; }
.connection-arrow { color: #555; font-size: 11px; }
.connection-rel { color: #e94560; font-size: 11px; background: rgba(233,69,96,0.1); padding: 1px 6px; border-radius: 4px; }
.connection-name { flex: 1; }
.connection-type-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.conversation-link {
  display: block; font-size: 13px; color: #6CB4EE; padding: 6px 8px;
  text-decoration: none; border-radius: 4px;
}
.conversation-link:hover { background: #1a1a2e; color: #fff; }
.conversation-date { color: #555; font-size: 11px; margin-right: 6px; }

.related-entities { display: flex; flex-wrap: wrap; gap: 6px; }
.related-tag {
  padding: 3px 10px; border-radius: 12px; font-size: 12px; cursor: pointer;
  border: 1px solid #333; color: #aaa;
}
.related-tag:hover { color: #fff; border-color: #888; }

#legend {
  position: absolute; top: 12px; right: 12px; background: rgba(22,33,62,0.9);
  border: 1px solid #0f3460; border-radius: 8px; padding: 12px; z-index: 5;
}
#legend h3 { font-size: 12px; color: #888; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Knowledge Graph</h1>
    <div id="stats"></div>
    <input type="text" id="search" placeholder="Search entities...">
  </div>
  <div id="filters"></div>
  <div id="entity-list"></div>
</div>

<div id="graph-container">
  <div id="graph"></div>
  <div id="legend"></div>
</div>

<div id="detail-panel">
  <div id="detail-header">
    <button id="close-detail">&times;</button>
    <h2 id="detail-name"></h2>
    <span class="detail-type-badge" id="detail-badge"></span>
    <span class="detail-date" id="detail-date"></span>
  </div>
  <div id="detail-body">
    <div class="detail-section">
      <h3>Description</h3>
      <div class="detail-desc" id="detail-desc"></div>
    </div>
    <div class="detail-section">
      <h3>Connections</h3>
      <div id="detail-connections"></div>
    </div>
    <div class="detail-section" id="detail-conversations-section" style="display:none">
      <h3>Conversations</h3>
      <div id="detail-conversations"></div>
    </div>
    <div class="detail-section" id="detail-related-section" style="display:none">
      <h3>Related Entities (same sessions)</h3>
      <div id="detail-related" class="related-entities"></div>
    </div>
  </div>
</div>

<script>
const GRAPH_DATA = __GRAPH_DATA__;
const CONVERSATIONS = __CONVERSATIONS__;

const TYPE_COLORS = {
  person: '#6CB4EE', project: '#77DD77', technology: '#FA8072',
  concept: '#DDA0DD', file: '#FFFACD', decision: '#F08080',
  task: '#87CEEB', problem: '#FFB6C1', database: '#98D8C8', unknown: '#888888'
};

const entities = GRAPH_DATA.nodes;
const relationships = GRAPH_DATA.edges;

// Build session-to-entity index
const sessionEntities = {};
entities.forEach(e => {
  (e.sessions || []).forEach(s => {
    if (!sessionEntities[s]) sessionEntities[s] = [];
    sessionEntities[s].push(e.name);
  });
});

// Build adjacency
const adjacency = {};
entities.forEach(e => { adjacency[e.name] = []; });
relationships.forEach(r => {
  if (adjacency[r.source]) adjacency[r.source].push({ target: r.target, type: r.type, context: r.context });
  if (adjacency[r.target]) adjacency[r.target].push({ target: r.source, type: r.type, context: r.context, reverse: true });
});

const connectionCount = {};
entities.forEach(e => { connectionCount[e.name] = (adjacency[e.name] || []).length; });

// vis.js setup
const nodes = new vis.DataSet(entities.map(e => ({
  id: e.name, label: e.name,
  title: `${e.type}: ${e.description || ''}`,
  color: {
    background: TYPE_COLORS[e.type] || TYPE_COLORS.unknown,
    border: TYPE_COLORS[e.type] || TYPE_COLORS.unknown,
    highlight: { background: '#fff', border: TYPE_COLORS[e.type] || TYPE_COLORS.unknown }
  },
  font: { color: '#e0e0e0', size: Math.max(10, Math.min(18, 10 + connectionCount[e.name])) },
  size: Math.max(8, Math.min(30, 8 + connectionCount[e.name] * 2)),
  entityType: e.type, description: e.description || '', date: e.date || '',
  sessions: e.sessions || []
})));

const edges = new vis.DataSet(relationships.map((r, i) => ({
  id: i, from: r.source, to: r.target, label: r.type,
  title: r.context || r.type, arrows: 'to',
  color: { color: '#333', highlight: '#e94560', opacity: 0.6 },
  font: { color: '#555', size: 9, strokeWidth: 0 },
  smooth: { type: 'continuous' }
})));

const container = document.getElementById('graph');
const network = new vis.Network(container, { nodes, edges }, {
  physics: {
    forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.005, springLength: 120, springConstant: 0.02 },
    solver: 'forceAtlas2Based', stabilization: { iterations: 150 }
  },
  interaction: { hover: true, tooltipDelay: 200, keyboard: true },
  edges: { width: 0.8, selectionWidth: 2 },
  nodes: { shape: 'dot', borderWidth: 2 }
});

document.getElementById('stats').textContent = `${entities.length} entities · ${relationships.length} relationships`;

// Legend
const legendHtml = Object.entries(TYPE_COLORS)
  .filter(([t]) => entities.some(e => e.type === t))
  .map(([t, c]) => `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${t}</div>`)
  .join('');
document.getElementById('legend').innerHTML = `<h3>Entity Types</h3>${legendHtml}`;

// Filters
const types = [...new Set(entities.map(e => e.type))].sort();
let activeFilters = new Set(types);
const filtersEl = document.getElementById('filters');
types.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn active';
  btn.style.color = TYPE_COLORS[t] || '#888';
  btn.textContent = t;
  btn.onclick = () => {
    if (activeFilters.has(t)) { activeFilters.delete(t); btn.classList.remove('active'); }
    else { activeFilters.add(t); btn.classList.add('active'); }
    applyFilters();
  };
  filtersEl.appendChild(btn);
});

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  const visible = entities.filter(e =>
    activeFilters.has(e.type) && (!query || e.name.toLowerCase().includes(query) || (e.description || '').toLowerCase().includes(query))
  );
  const visibleNames = new Set(visible.map(e => e.name));
  nodes.forEach(n => { nodes.update({ id: n.id, hidden: !visibleNames.has(n.id) }); });
  edges.forEach(e => { edges.update({ id: e.id, hidden: !visibleNames.has(e.from) || !visibleNames.has(e.to) }); });
  renderEntityList(visible);
}

function renderEntityList(list) {
  const el = document.getElementById('entity-list');
  const sorted = [...list].sort((a, b) => (connectionCount[b.name] || 0) - (connectionCount[a.name] || 0));
  el.innerHTML = sorted.map(e => `
    <div class="entity-item" data-name="${e.name.replace(/"/g, '&quot;')}">
      <div class="entity-dot" style="background:${TYPE_COLORS[e.type] || '#888'}"></div>
      <span class="entity-name">${e.name}</span>
      <span class="entity-count">${connectionCount[e.name] || 0}</span>
    </div>
  `).join('');
  el.querySelectorAll('.entity-item').forEach(item => {
    item.onclick = () => focusNode(item.dataset.name);
  });
}

function focusNode(name) {
  network.focus(name, { scale: 1.5, animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
  network.selectNodes([name]);
  showDetail(name);
}

function showDetail(name) {
  const entity = entities.find(e => e.name === name);
  if (!entity) return;

  const color = TYPE_COLORS[entity.type] || TYPE_COLORS.unknown;

  document.getElementById('detail-name').textContent = entity.name;
  const badge = document.getElementById('detail-badge');
  badge.textContent = entity.type;
  badge.style.background = color + '22';
  badge.style.color = color;
  badge.style.border = `1px solid ${color}44`;
  document.getElementById('detail-date').textContent = entity.date ? `First seen: ${entity.date}` : '';
  document.getElementById('detail-desc').textContent = entity.description || 'No description available.';

  // Connections
  const conns = adjacency[name] || [];
  const connHtml = conns.map(c => {
    const targetEntity = entities.find(e => e.name === c.target);
    const tColor = targetEntity ? (TYPE_COLORS[targetEntity.type] || '#888') : '#888';
    return `<div class="connection-item" onclick="focusNode('${c.target.replace(/'/g, "\\'")}')">
      <span class="connection-arrow">${c.reverse ? '&#8592;' : '&#8594;'}</span>
      <span class="connection-rel">${c.type}</span>
      <span class="connection-name">${c.target}</span>
      <span class="connection-type-dot" style="background:${tColor}" title="${targetEntity ? targetEntity.type : ''}"></span>
    </div>`;
  }).join('');
  document.getElementById('detail-connections').innerHTML = connHtml || '<div style="color:#555;padding:8px">No connections</div>';

  // Conversations
  const sessions = entity.sessions || [];
  const convSection = document.getElementById('detail-conversations-section');
  const convEl = document.getElementById('detail-conversations');
  if (sessions.length > 0) {
    const convHtml = sessions.map(sid => {
      const conv = CONVERSATIONS.find(c => c.session_id === sid);
      if (conv) {
        return `<a class="conversation-link" href="${conv.url}" target="_blank">
          <span class="conversation-date">${conv.date}</span>${conv.title}
        </a>`;
      }
      return `<div class="conversation-link"><span class="conversation-date">${sid}</span></div>`;
    }).join('');
    convEl.innerHTML = convHtml;
    convSection.style.display = 'block';
  } else {
    convSection.style.display = 'none';
  }

  // Related entities from same sessions
  const relatedSection = document.getElementById('detail-related-section');
  const relatedEl = document.getElementById('detail-related');
  const relatedNames = new Set();
  sessions.forEach(s => {
    (sessionEntities[s] || []).forEach(n => { if (n !== name) relatedNames.add(n); });
  });
  if (relatedNames.size > 0) {
    relatedEl.innerHTML = [...relatedNames].slice(0, 20).map(n => {
      const re = entities.find(e => e.name === n);
      const rc = re ? TYPE_COLORS[re.type] || '#888' : '#888';
      return `<span class="related-tag" style="border-color:${rc}44;color:${rc}" onclick="focusNode('${n.replace(/'/g, "\\'")}')">${n}</span>`;
    }).join('');
    relatedSection.style.display = 'block';
  } else {
    relatedSection.style.display = 'none';
  }

  document.getElementById('detail-panel').classList.add('visible');
}

document.getElementById('close-detail').onclick = () => {
  document.getElementById('detail-panel').classList.remove('visible');
};

network.on('click', params => {
  if (params.nodes.length > 0) showDetail(params.nodes[0]);
  else document.getElementById('detail-panel').classList.remove('visible');
});

network.on('doubleClick', params => {
  if (params.nodes.length > 0) {
    const name = params.nodes[0];
    const neighbors = (adjacency[name] || []).map(c => c.target);
    network.fit({ nodes: [name, ...neighbors], animation: { duration: 500 } });
  }
});

document.getElementById('search').addEventListener('input', applyFilters);
renderEntityList(entities);
</script>
</body>
</html>
